<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Wars</title>

    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div class="login-container">

        <h1>TEAM WARS</h1>

        <p class="subtitle">
            Login oder Registrierung
        </p>

        <input type="text" id="usernameInput" placeholder="Benutzername">
        <input type="password" id="passwordInput" placeholder="Passwort">

        <button id="loginBtn">
            Einloggen
        </button>

        <button id="registerBtn" class="secondary-btn">
            Registrieren
        </button>

        <p id="authMessage" class="message"></p>

    </div>

        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="assets/js/supabase.js"></script>
        <script src="assets/js/auth.js"></script>
        <script src="assets/js/app.js"></script>

</body>
</html>
