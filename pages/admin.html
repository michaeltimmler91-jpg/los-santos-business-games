<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Wars - Admin</title>

    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <div class="game-container">

        <header class="game-header">
            <div>
                <h1>Adminbereich</h1>
                <p>Teams verwalten und Teamleiter festlegen</p>
            </div>

            <nav>
                <a href="dashboard.html">Spiel</a>
                <a href="ranking.html">Rangliste</a>
                <a href="teams.html">Teams</a>
                <a href="team-admin.html">Teamleitung</a>
                <a href="admin.html">Admin</a>
            </nav>
        </header>

        <main class="dashboard-grid">

            <section class="panel">
                <h2>Neues Team erstellen</h2>

                <input type="text" id="teamNameInput" placeholder="Teamname">
                <input type="color" id="teamColorInput" value="#facc15">

                <button id="createTeamBtn">
                    Team erstellen
                </button>

                <p id="adminMessage" class="message"></p>
            </section>

            <section class="panel">
                <h2>Teams verwalten</h2>
                <div id="adminTeamList" class="admin-team-list"></div>
            </section>

        </main>

    </div>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/storage.js"></script>
    <script src="../assets/js/teams.js"></script>
    <script src="../assets/js/admin.js"></script>

</body>
</html>
