<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Dashboard</title>

    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <div class="game-container">

        <header class="game-header">

            <div>
                <h1>Dashboard</h1>

                <p id="playerInfo">
                    Lade Spieler...
                </p>
            </div>

            <nav>
                <a href="dashboard.html">Spiel</a>
                <a href="teams.html">Firmen</a>
                <a href="ranking.html">Rangliste</a>
                <a href="seasons.html">Seasons</a>
                <a href="team-admin.html">Firmenleitung</a>
                <a href="admin.html">User-Admin</a>
                <a href="admin-teams.html">Firmen-Admin</a>
            </nav>

        </header>

        <main class="dashboard-grid">

            <section class="panel">
                <h2>Tagesaufgaben</h2>
                <div id="dailyTasksList"></div>
            </section>

            <section class="panel">

                <h2>Energie</h2>

                <div class="energy-bar">
                    <div
                        class="energy-fill"
                        id="energyFill"
                        style="width:100%"
                    ></div>
                </div>

                <p id="energyText">
                    100 / 100
                </p>

            </section>

            <section class="panel">

                <h2>RP-Aktionen</h2>

                <div id="actionsList"></div>

            </section>

        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="../assets/js/supabase.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/game-teams.js"></script>
    <script src="../assets/js/game-members.js"></script>
    <script src="../assets/js/game-actions.js"></script>
    <script src="../assets/js/game-cooldowns.js"></script>
    <script src="../assets/js/game-energy.js"></script>
    <script src="../assets/js/game-daily-tasks.js"></script>
    <script src="../assets/js/game-logs.js"></script>
    <script src="../assets/js/game-levels.js"></script>
    <script src="../assets/js/dashboard-actions.js"></script>

</body>
</html>
