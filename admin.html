<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Games Admin</title>

    <link rel="stylesheet" href="css/style.css?v=1">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="app">

    <header class="hero">
        <h1>👑 Business Games Admin</h1>
        <p>Firmen erstellen, Codes verwalten und Punkte ansehen.</p>
    </header>

    <section class="card">
        <h2>🏢 Neue Firma</h2>

        <label>Firmenname</label>
        <input id="companyName" type="text" placeholder="z.B. Los Santos Taxi">

        <label>Icon</label>
        <input id="companyIcon" type="text" value="🏢">

        <label>Farbe</label>
        <input id="companyColor" type="color" value="#38bdf8">

        <label>Beitrittscode</label>
        <input id="companyCode" type="text" placeholder="z.B. TAXI-1234">

        <button onclick="createCompany()">Firma erstellen</button>
        <button class="secondary" onclick="generateCode()">Code generieren</button>

        <div id="adminMessage" class="message"></div>
    </section>

    <section class="card">
        <h2>📋 Firmen</h2>
        <div id="adminCompanies">L&auml;dt...</div>
    </section>

    <section class="card">
        <h2>🏆 Rangliste</h2>
        <div id="adminLeaderboard">L&auml;dt...</div>
    </section>

    <footer>
        <a href="index.html">Zur&uuml;ck zum Spiel</a>
    </footer>

</div>

<script src="js/config.js?v=1"></script>
<script src="js/admin.js?v=1"></script>
</body>
</html>
